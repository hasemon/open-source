services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: plane
      POSTGRES_PASSWORD: plane
      POSTGRES_DB: plane
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: plane
      MINIO_ROOT_PASSWORD: plane12345
    ports:
      - "9002:9001"
    volumes:
      - minio_data:/data

  plane:
    image: makeplane/plane-aio-community:stable
    container_name: plane
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - minio
    ports:
      - "80:80"
    environment:
      DOMAIN_NAME: 127.0.0.1
      SITE_ADDRESS: ":80"
      APP_PROTOCOL: http
      DATABASE_URL: postgresql://plane:plane@postgres:5432/plane
      REDIS_URL: redis://redis:6379
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: plane
      AWS_SECRET_ACCESS_KEY: plane12345
      AWS_S3_BUCKET_NAME: plane
      AWS_S3_ENDPOINT_URL: http://minio:9000
      USE_MINIO: "1"
    volumes:
      - type: volume
        source: plane_data
        target: /app/data
      - type: bind
        source: ./proxy/Caddyfile
        target: /app/proxy/Caddyfile
        read_only: true

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  plane_data:
