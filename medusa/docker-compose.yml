services:
  postgres:
    image: postgres:16
    container_name: medusa-postgres
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
      POSTGRES_DB: medusa
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa -d medusa"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: medusa-redis
    ports:
      - "6379:6379"

  medusa-backend:
    image: node:22-bookworm-slim
    container_name: medusa-backend
    working_dir: /app/medusa-backend
    volumes:
      - ./:/app
      - medusa_backend_node_modules:/app/medusa-backend/node_modules
    environment:
      DATABASE_URL: postgresql://medusa:medusa@postgres:5432/medusa
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      HMR_PORT: 42021
      HMR_HOST: localhost
      HMR_CLIENT_PORT: 42021
      HMR_BIND_HOST: 0.0.0.0
    ports:
      - "9000:9000"
      - "42021:42021"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "if [ ! -d node_modules/@medusajs/medusa ]; then npm ci; fi &&
      cd apps/backend &&
      npm run dev"

  medusa-cli:
    image: node:22-alpine
    profiles:
      - setup
    working_dir: /app
    volumes:
      - ./:/app
      - medusa_backend_node_modules:/app/medusa-backend/node_modules
    environment:
      CI: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "apk add --no-cache git &&
      echo n | npx -y create-medusa-app@latest medusa-backend
      --db-url postgresql://medusa:medusa@postgres:5432/medusa
      --no-browser
      --use-npm
      --verbose"

volumes:
  postgres_data:
  medusa_backend_node_modules:
